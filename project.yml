name: MemoryDot
options:
    deploymentTarget:
        macOS: "14.0"
    xcodeVersion: "16.0"
settings:
    base:
        SWIFT_VERSION: "6.3"
targets:
    MemoryDot:
        type: application
        platform: macOS
        sources:
            - Sources/MemoryDot
        resources:
            - SupportingFiles/Assets.xcassets
        settings:
            base:
                PRODUCT_BUNDLE_IDENTIFIER: com.memorydot.app
                INFOPLIST_FILE: SupportingFiles/Info.plist
                ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
                COMBINE_HIDPI_IMAGES: true
                CODE_SIGN_STYLE: Automatic
